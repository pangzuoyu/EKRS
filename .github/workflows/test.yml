name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e shared/ -e 'rag[dev]'
      - name: Run tests with coverage gate (D9)
        run: |
          cd rag
          pytest tests/ \
            --cov=ekrs_rag \
            --cov-fail-under=85 \
            -v